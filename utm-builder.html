<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UTM 連結產生器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+TC:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{
    --bg:#0a0f1c;
    --bg-glow:radial-gradient(ellipse 60% 40% at 20% -10%, rgba(242,161,84,0.09), transparent), radial-gradient(ellipse 50% 40% at 100% 0%, rgba(95,214,138,0.06), transparent);
    --panel:#121a2b;
    --panel-soft:#0e1524;
    --border:#232f47;
    --border-strong:#324260;
    --text:#e8ecf5;
    --muted:#8996ad;
    --subtle:#5c6a85;
    --accent:#f2a154;
    --accent-deep:#c97d34;
    --accent-soft:rgba(242,161,84,0.14);
    --success:#5fd68a;
    --success-soft:rgba(95,214,138,0.14);
    --danger:#f2685c;
    --danger-soft:rgba(242,104,92,0.14);
    --sans:'IBM Plex Sans TC', 'Segoe UI', system-ui, sans-serif;
    --mono:'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; color:var(--text); font-family:var(--sans);
    background: var(--bg-glow), var(--bg);
    background-attachment: fixed;
  }
  button{ font:inherit; cursor:pointer; appearance:none; -webkit-appearance:none; border:none; background:none; margin:0; }
  a{ color:inherit; }
  input, select{
    width:100%; color:var(--text); background:var(--panel-soft); border:1px solid var(--border-strong);
    border-radius:8px; padding:10px 12px; font-family:var(--mono); font-size:14px; outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  input:focus, select:focus{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  label{ display:block; margin-bottom:6px; color:var(--muted); font-size:12.5px; font-weight:500; letter-spacing:.01em; }
  .page{ max-width:920px; margin:0 auto; padding:28px 20px 60px; }
  .topbar{ margin-bottom:28px; }
  .back-link{
    display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:11.5px; color:var(--muted);
    text-decoration:none; border:1px solid var(--border); border-radius:7px; padding:5px 11px; transition:color .15s, border-color .15s;
  }
  .back-link:hover{ color:var(--accent); border-color:var(--accent-deep); }

  header{ margin-bottom:28px; }
  .eyebrow{
    display:inline-flex; align-items:center; gap:7px; font-family:var(--mono); font-size:11.5px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--accent); margin-bottom:12px;
  }
  .eyebrow .dot{ width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); animation:pulse 2s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }
  h1{ font-size:30px; margin:0 0 8px; letter-spacing:-.01em; }
  .lead{ margin:0; color:var(--muted); font-size:14px; line-height:1.7; max-width:640px; }

  .panel{ background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:22px; }
  .panel + .panel{ margin-top:20px; }
  .panel-title{ display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; color:var(--text); margin:0 0 16px; }
  .panel-title i{ width:15px; height:15px; color:var(--accent); }

  .field{ margin-bottom:14px; }
  .field:last-child{ margin-bottom:0; }
  .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .field-hint{ font-size:11.5px; color:var(--subtle); margin-top:5px; }
  .required-mark{ color:var(--accent); }

  .presets{ display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .preset-chip{
    font-family:var(--mono); font-size:11px; padding:4px 10px; border-radius:99px; border:1px solid var(--border-strong);
    color:var(--muted); background:var(--panel-soft); transition:all .15s;
  }
  .preset-chip:hover{ color:var(--accent); border-color:var(--accent-deep); }

  .preview-box{
    background:var(--panel-soft); border:1px solid var(--border-strong); border-radius:8px; padding:16px;
    font-family:var(--mono); font-size:13.5px; line-height:1.8; word-break:break-all; min-height:56px;
  }
  .preview-base{ color:var(--text); }
  .preview-sep{ color:var(--subtle); }
  .preview-key{ color:var(--subtle); }
  .preview-val{ color:var(--accent); font-weight:600; }
  .preview-empty{ color:var(--subtle); font-style:normal; }

  .actions-row{ display:flex; gap:10px; margin-top:14px; }
  .button{
    display:inline-flex; align-items:center; justify-content:center; gap:7px;
    min-height:40px; padding:9px 16px; border-radius:8px; border:1px solid var(--border-strong);
    background:var(--panel-soft); color:var(--text); font-size:13.5px; font-weight:500;
    transition:transform .12s ease, border-color .12s ease, background .12s ease;
  }
  .button:hover{ transform:translateY(-1px); border-color:var(--accent-deep); }
  .button.primary{ background:var(--accent); border-color:var(--accent); color:#1a1206; font-weight:600; }
  .button.primary:hover{ background:#f5b06e; }
  .button.small{ min-height:32px; padding:5px 11px; font-size:12px; }
  .button i{ width:15px; height:15px; }

  .history-empty{ color:var(--subtle); font-size:13px; padding:8px 0; }
  .history-item{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:12px 0; border-top:1px solid var(--border);
  }
  .history-item:first-child{ border-top:none; }
  .history-main{ min-width:0; flex:1; }
  .history-name{ font-size:13.5px; font-weight:600; margin-bottom:3px; }
  .history-url{ font-family:var(--mono); font-size:11.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .history-meta{ font-family:var(--mono); font-size:10.5px; color:var(--subtle); margin-top:4px; }
  .history-actions{ display:flex; gap:6px; flex-shrink:0; }
  .icon-btn{
    width:32px; height:32px; border-radius:7px; border:1px solid var(--border-strong); background:var(--panel-soft);
    color:var(--muted); display:flex; align-items:center; justify-content:center; transition:all .15s;
  }
  .icon-btn:hover{ color:var(--accent); border-color:var(--accent-deep); }
  .icon-btn.danger:hover{ color:var(--danger); border-color:var(--danger); }
  .icon-btn i{ width:14px; height:14px; }

  .toast{
    position:fixed; left:50%; bottom:26px; transform:translate(-50%,80px); background:var(--panel); border:1px solid var(--border-strong);
    color:var(--text); padding:11px 20px; border-radius:99px; font-size:13px; box-shadow:0 12px 30px rgba(0,0,0,.4);
    opacity:0; transition:transform .25s ease, opacity .25s ease; pointer-events:none; z-index:50;
  }
  .toast.show{ transform:translate(-50%,0); opacity:1; }

  @media (max-width:640px){
    .field-row{ grid-template-columns:1fr; }
    h1{ font-size:24px; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <a href="tools.html" class="back-link">← 回到工具總覽</a>
  </div>

  <header>
    <div class="eyebrow"><span class="dot"></span>CAMPAIGN LINK BUILDER</div>
    <h1>UTM 連結產生器</h1>
    <p class="lead">幫連結加上追蹤參數，GA4 才能正確辨識流量來自哪個管道、哪個活動。填好欄位即時看到組好的連結，一鍵複製，紀錄會留在這台裝置上方便重複使用。</p>
  </header>

  <div class="panel">
    <div class="panel-title"><i data-lucide="link-2"></i>連結設定</div>

    <div class="field">
      <label for="baseUrl">目標網址 <span class="required-mark">*</span></label>
      <input id="baseUrl" type="text" placeholder="https://example.com/landing-page" autocomplete="off">
    </div>

    <div class="field-row">
      <div class="field">
        <label for="utmSource">Campaign Source（來源）<span class="required-mark">*</span></label>
        <input id="utmSource" type="text" placeholder="例：google, facebook, line" autocomplete="off">
        <div class="presets" id="sourcePresets"></div>
      </div>
      <div class="field">
        <label for="utmMedium">Campaign Medium（媒介）<span class="required-mark">*</span></label>
        <input id="utmMedium" type="text" placeholder="例：cpc, social, email" autocomplete="off">
        <div class="presets" id="mediumPresets"></div>
      </div>
    </div>

    <div class="field">
      <label for="utmCampaign">Campaign Name（活動名稱）<span class="required-mark">*</span></label>
      <input id="utmCampaign" type="text" placeholder="例：2026_spring_sale" autocomplete="off">
    </div>

    <div class="field-row">
      <div class="field">
        <label for="utmTerm">Campaign Term（選填，付費關鍵字）</label>
        <input id="utmTerm" type="text" placeholder="例：running_shoes" autocomplete="off">
      </div>
      <div class="field">
        <label for="utmContent">Campaign Content（選填，區分素材版本）</label>
        <input id="utmContent" type="text" placeholder="例：banner_a, textlink" autocomplete="off">
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title"><i data-lucide="zap"></i>產生的連結</div>
    <div class="preview-box" id="previewBox"></div>
    <div class="actions-row">
      <button class="button primary" id="copyBtn"><i data-lucide="copy"></i>複製連結</button>
      <button class="button" id="saveBtn"><i data-lucide="clock"></i>存進紀錄</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title"><i data-lucide="history"></i>歷史紀錄</div>
    <div id="historyList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SOURCE_PRESETS = ["google","facebook","instagram","line","newsletter"];
  const MEDIUM_PRESETS = ["cpc","social","email","referral","organic"];
  const HISTORY_KEY = "utmBuilder.history.v1";

  const els = {
    baseUrl: document.getElementById("baseUrl"),
    source: document.getElementById("utmSource"),
    medium: document.getElementById("utmMedium"),
    campaign: document.getElementById("utmCampaign"),
    term: document.getElementById("utmTerm"),
    content: document.getElementById("utmContent"),
    previewBox: document.getElementById("previewBox"),
    copyBtn: document.getElementById("copyBtn"),
    saveBtn: document.getElementById("saveBtn"),
    historyList: document.getElementById("historyList"),
    sourcePresets: document.getElementById("sourcePresets"),
    mediumPresets: document.getElementById("mediumPresets"),
    toast: document.getElementById("toast")
  };

  function renderPresets(container, values, targetInput) {
    container.innerHTML = values.map(v => `<button type="button" class="preset-chip" data-val="${v}">${v}</button>`).join("");
    container.querySelectorAll(".preset-chip").forEach(chip => {
      chip.addEventListener("click", () => {
        targetInput.value = chip.dataset.val;
        updatePreview();
      });
    });
  }
  renderPresets(els.sourcePresets, SOURCE_PRESETS, els.source);
  renderPresets(els.mediumPresets, MEDIUM_PRESETS, els.medium);

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, ch => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[ch]));
  }

  function buildUrl() {
    const base = els.baseUrl.value.trim();
    if (!base) return { url: "", valid: false };

    let urlObj;
    try {
      urlObj = new URL(base);
    } catch (e) {
      return { url: "", valid: false, error: "網址格式不對，記得要有 https:// 開頭" };
    }

    const params = [
      ["utm_source", els.source.value.trim()],
      ["utm_medium", els.medium.value.trim()],
      ["utm_campaign", els.campaign.value.trim()],
      ["utm_term", els.term.value.trim()],
      ["utm_content", els.content.value.trim()]
    ].filter(([, v]) => v);

    params.forEach(([k, v]) => urlObj.searchParams.set(k, v));
    return { url: urlObj.toString(), valid: true, base, params };
  }

  function updatePreview() {
    const result = buildUrl();
    if (!els.baseUrl.value.trim()) {
      els.previewBox.innerHTML = `<span class="preview-empty">先填目標網址，這裡會即時顯示組好的連結...</span>`;
      return;
    }
    if (result.error) {
      els.previewBox.innerHTML = `<span style="color:var(--danger)">${escapeHtml(result.error)}</span>`;
      return;
    }
    const baseHtml = `<span class="preview-base">${escapeHtml(result.base)}</span>`;
    const paramsHtml = result.params.map(([k, v], i) => {
      const sep = i === 0 ? "?" : "&";
      return `<span class="preview-sep">${sep}</span><span class="preview-key">${k}=</span><span class="preview-val">${escapeHtml(v)}</span>`;
    }).join("");
    els.previewBox.innerHTML = baseHtml + (paramsHtml || `<span class="preview-empty"> （還沒有任何 utm 參數）</span>`);
  }

  [els.baseUrl, els.source, els.medium, els.campaign, els.term, els.content].forEach(input => {
    input.addEventListener("input", updatePreview);
  });

  let toastTimer = null;
  function showToast(msg) {
    els.toast.textContent = msg;
    els.toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => els.toast.classList.remove("show"), 2200);
  }

  els.copyBtn.addEventListener("click", async () => {
    const result = buildUrl();
    if (!result.valid || !result.url) {
      showToast("請先填好目標網址跟必填欄位。");
      return;
    }
    try {
      await navigator.clipboard.writeText(result.url);
    } catch (e) {
      const helper = document.createElement("textarea");
      helper.value = result.url;
      helper.style.position = "fixed";
      helper.style.opacity = "0";
      document.body.appendChild(helper);
      helper.select();
      document.execCommand("copy");
      helper.remove();
    }
    showToast("已複製連結。");
  });

  function loadHistory() {
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      const parsed = raw ? JSON.parse(raw) : [];
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) {
      return [];
    }
  }
  function saveHistory(items) {
    try {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(items));
    } catch (e) {
      showToast("儲存紀錄失敗，瀏覽器儲存空間可能已滿。");
    }
  }

  let history = loadHistory();

  function renderHistory() {
    if (!history.length) {
      els.historyList.innerHTML = `<div class="history-empty">還沒有存過任何連結，產生連結後點「存進紀錄」就會出現在這裡。</div>`;
      return;
    }
    els.historyList.innerHTML = history.map(item => `
      <div class="history-item" data-id="${item.id}">
        <div class="history-main">
          <div class="history-name">${escapeHtml(item.campaign || "（未命名活動）")}</div>
          <div class="history-url">${escapeHtml(item.url)}</div>
          <div class="history-meta">${escapeHtml(item.source)} / ${escapeHtml(item.medium)} · ${new Date(item.createdAt).toLocaleDateString("zh-TW")}</div>
        </div>
        <div class="history-actions">
          <button type="button" class="icon-btn" data-action="copy" title="複製連結"><i data-lucide="copy"></i></button>
          <button type="button" class="icon-btn danger" data-action="delete" title="刪除"><i data-lucide="trash-2"></i></button>
        </div>
      </div>
    `).join("");
    lucide.createIcons();
  }

  els.saveBtn.addEventListener("click", () => {
    const result = buildUrl();
    if (!result.valid || !result.url || !els.source.value.trim() || !els.medium.value.trim() || !els.campaign.value.trim()) {
      showToast("來源、媒介、活動名稱都填好才能存進紀錄。");
      return;
    }
    history.unshift({
      id: (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now()),
      url: result.url,
      campaign: els.campaign.value.trim(),
      source: els.source.value.trim(),
      medium: els.medium.value.trim(),
      createdAt: new Date().toISOString()
    });
    history = history.slice(0, 50);
    saveHistory(history);
    renderHistory();
    showToast("已存進紀錄。");
  });

  els.historyList.addEventListener("click", async event => {
    const btn = event.target.closest("[data-action]");
    if (!btn) return;
    const row = btn.closest(".history-item");
    const id = row.dataset.id;
    const item = history.find(h => h.id === id);
    if (!item) return;

    if (btn.dataset.action === "copy") {
      try {
        await navigator.clipboard.writeText(item.url);
        showToast("已複製連結。");
      } catch (e) {
        showToast("複製失敗，請手動選取複製。");
      }
    }
    if (btn.dataset.action === "delete") {
      history = history.filter(h => h.id !== id);
      saveHistory(history);
      renderHistory();
    }
  });

  updatePreview();
  renderHistory();
  lucide.createIcons();
</script>
</body>
</html>
