  <!-- 三模式（Dev/Visual/Brand）預先套用，避免切換閃爍(FOUC)；需在任何樣式渲染前同步執行 -->
  <script>
    (function () {
      var MODES = ['dev', 'visual', 'brand'];
      try {
        var qs = new URLSearchParams(window.location.search);
        var qMode = qs.get('mode');
        var legacyMap = { terminal: 'dev', dashboard: 'visual', dev: 'dev', visual: 'visual', brand: 'brand' };
        var mode = (qMode && legacyMap[qMode]) || localStorage.getItem('mode');
        if (!mode) {
          var legacyTheme = localStorage.getItem('theme');
          mode = legacyTheme === 'light' ? 'visual' : 'dev';
        }
        if (MODES.indexOf(mode) === -1) mode = 'dev';
        document.documentElement.setAttribute('data-theme', mode);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dev');
      }
    })();
  </script>

    function initHossetCanvas() {
      const canvas = document.getElementById('canvas-container');
      const svg = document.getElementById('canvas-svg');
      if (!canvas || !svg) return;

      const nodeIds = ['node-trigger', 'node-omnichat', 'node-cyberbiz', 'node-coupon', 'node-analytics'];
      const nodes = nodeIds.map(id => ({ id, el: document.getElementById(id) }));
      const connections = [
        { from: 'node-trigger', to: 'node-omnichat' },
        { from: 'node-omnichat', to: 'node-cyberbiz' },
        { from: 'node-cyberbiz', to: 'node-coupon' },
        { from: 'node-coupon', to: 'node-analytics' }
      ];

      let activeNode = null, offsetX = 0, offsetY = 0;

      nodes.forEach(node => {
        node.el.addEventListener('mousedown', (e) => {
          if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A') return;
          activeNode = node.el;
          const rect = activeNode.getBoundingClientRect();
          offsetX = e.clientX - rect.left;
          offsetY = e.clientY - rect.top;
          activeNode.style.transition = 'none';
          e.preventDefault();
        });
      });

      document.addEventListener('mousemove', (e) => {
        if (!activeNode) return;
        const canvasRect = canvas.getBoundingClientRect();
        let left = e.clientX - canvasRect.left - offsetX;
        let top = e.clientY - canvasRect.top - offsetY;
        left = Math.max(10, Math.min(canvasRect.width - activeNode.offsetWidth - 10, left));
        top = Math.max(10, Math.min(canvasRect.height - activeNode.offsetHeight - 10, top));
        activeNode.style.left = `${left}px`;
        activeNode.style.top = `${top}px`;
        drawConnections();
      });

      document.addEventListener('mouseup', () => {
        if (activeNode) {
          activeNode.style.transition = '';
          activeNode = null;
        }
      });

      function drawConnections() {
        svg.querySelectorAll('path').forEach(p => p.remove());
        const theme = document.documentElement.getAttribute('data-theme');
        const strokeColor = theme === 'visual' ? '#7c3aed' : theme === 'brand' ? '#5a5550' : '#3fb950';

        connections.forEach(conn => {
          const fromEl = document.getElementById(conn.from);
          const toEl = document.getElementById(conn.to);
          if (!fromEl || !toEl) return;
          const fromRect = { left: parseFloat(fromEl.style.left), top: parseFloat(fromEl.style.top), width: fromEl.offsetWidth, height: fromEl.offsetHeight };
          const toRect = { left: parseFloat(toEl.style.left), top: parseFloat(toEl.style.top), width: toEl.offsetWidth, height: toEl.offsetHeight };
          const startX = fromRect.left + fromRect.width;
          const startY = fromRect.top + (fromRect.height / 2);
          const endX = toRect.left;
          const endY = toRect.top + (toRect.height / 2);
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', `M ${startX} ${startY} C ${startX + 50} ${startY}, ${endX - 50} ${endY}, ${endX} ${endY}`);
          path.setAttribute('stroke', strokeColor);
          path.setAttribute('stroke-width', '2');
          path.setAttribute('fill', 'none');
          path.setAttribute('marker-end', 'url(#arrow)');
          svg.appendChild(path);
        });
      }

      window.__hossetDrawConnections = drawConnections;
      setTimeout(drawConnections, 100);
      window.addEventListener('resize', drawConnections);
    }

        </div>
        <div>
          <div class="flex items-center space-x-2 mb-1.5">
            <h3 class="font-bold font-mono">${String(sopActive + 1).padStart(2, "0")} // ${stage.title}</h3>
            <span class="text-[10px] font-mono text-muted-foreground">${stage.subtitle}</span>
          </div>
          <p class="text-sm text-muted-foreground leading-relaxed">${stage.detail}</p>
        </div>
      `;
      lucide.createIcons();
    }

    function initS23uSop() {
      sopActive = 0;
      renderSopTrack();
      renderSopDetail();
    }

    // 渲染 Case Study
    function renderCaseStudy() {
      const slug = getQueryParam('slug') || 's23u-rental';
      const data = PROJECT_DATA[slug];
      const container = document.getElementById('case-study-container');

      if (!data) {
        container.innerHTML = `
          <div class="text-center py-20 text-red-500 font-mono">
            <i data-lucide="alert-triangle" class="w-12 h-12 mx-auto mb-4"></i>
            <span>找不到指定的專案數據！</span>
            <br>
            <a href="projects.html" class="mt-4 inline-block text-sm text-primary underline">// 返回作品集</a>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      // 格式化換行文案為 HTML 段落
      const formatText = (text) => {
        return text.split('\n').map(p => {
          if (p.startsWith('•')) {
            return `<li class="ml-4 list-disc text-muted-foreground text-sm leading-relaxed">${p.replace('•', '').trim()}</li>`;
          }
          if (p.match(/^\d\./)) {
            return `<div class="pl-2 text-sm leading-relaxed mt-2"><strong class="text-primary font-mono">${p.substring(0,2)}</strong> ${p.substring(2).trim()}</div>`;
          }
          return `<p class="text-muted-foreground text-sm leading-relaxed mt-2">${p}</p>`;
        }).join('');
      };

      const heroMedia = data.heroImage
        ? `<img src="${data.heroImage}" alt="${data.title}" class="w-full h-full object-cover opacity-85">`
        : `<div class="w-full h-full flex items-center justify-center bg-muted/60">
             <div class="text-center space-y-2 opacity-50">
               <i data-lucide="image" class="w-8 h-8 mx-auto"></i>
               <div class="text-xs font-mono">// 待補案例實圖</div>
             </div>
           </div>`;

      container.innerHTML = `
        <!-- 專案大圖與標題 -->
        <div class="space-y-6">
          <div class="relative rounded-3xl overflow-hidden border border-border shadow-2xl aspect-[21/9] bg-black">
            ${heroMedia}
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
            <div class="absolute bottom-6 left-6 md:bottom-10 md:left-10 space-y-2 text-white">
              <span class="text-xs font-mono font-bold px-3 py-1 rounded bg-primary text-primary-foreground">${data.category}</span>
              <h1 class="text-2xl md:text-4xl font-extrabold font-mono tracking-tight">${data.title}</h1>
            </div>
          </div>
        </div>

        <!-- 核心指標卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          ${data.stats.map(stat => `
            <div class="p-6 rounded-2xl border border-border bg-card shadow-xl text-center">
              <div class="text-xs text-muted-foreground font-mono mb-1">// ${stat.label}</div>
              <div class="text-2xl md:text-3xl font-extrabold text-primary font-mono">${stat.value}</div>
            </div>
          `).join('')}
        </div>

        <!-- 專案資訊表格 -->
        <div class="rounded-2xl border border-border bg-card/20 backdrop-blur-md overflow-hidden">
          <table class="w-full text-left border-collapse text-sm">
            <tbody>
              <tr class="border-b border-border/60">
                <th class="p-4 bg-muted/40 font-mono text-xs w-[180px] text-muted-foreground">// 我的角色</th>
                <td class="p-4 font-bold">${data.role}</td>
              </tr>
              <tr class="border-b border-border/60">
                <th class="p-4 bg-muted/40 font-mono text-xs text-muted-foreground">// 專案時程</th>
                <td class="p-4 font-mono">${data.timeline}</td>
              </tr>
              <tr>
                <th class="p-4 bg-muted/40 font-mono text-xs text-muted-foreground">// 預算規模</th>
                <td class="p-4 font-mono text-muted-foreground">${data.budget}</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- 詳細 Case Study 內容 -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-8 pt-6">
          <!-- 左側 8 欄：詳細內容 -->
          <div class="md:col-span-8 space-y-8">
            <div class="space-y-3">
              <h2 class="text-lg font-bold font-mono text-foreground flex items-center space-x-2">
                <span class="w-1.5 h-4 bg-primary rounded-full"></span>
                <span>// 1. 專案背景 (Background)</span>
              </h2>
              <p class="text-muted-foreground text-sm leading-relaxed">${data.background}</p>
            </div>

            <div class="space-y-3">
              <h2 class="text-lg font-bold font-mono text-foreground flex items-center space-x-2">
                <span class="w-1.5 h-4 bg-primary rounded-full"></span>
                <span>// 2. 面臨挑戰 (Challenges)</span>
              </h2>
              <div class="space-y-2">${formatText(data.challenge)}</div>
            </div>

            <div class="space-y-3">
              <h2 class="text-lg font-bold font-mono text-foreground flex items-center space-x-2">
                <span class="w-1.5 h-4 bg-primary rounded-full"></span>
                <span>// 3. 解決方案 (Solutions)</span>
              </h2>
              <div class="space-y-2">${formatText(data.solution)}</div>
            </div>
          </div>

          <!-- 右側 4 欄：量化成果 -->
          <div class="md:col-span-4">
            <div class="p-6 rounded-2xl border border-primary/20 bg-primary/5 space-y-4 shadow-xl">
              <h3 class="text-sm font-bold font-mono text-primary flex items-center space-x-2">
                <i data-lucide="award" class="w-4 h-4"></i>
                <span>// 4. 量化成果 (Results)</span>
              </h3>
              <ul class="space-y-3">
                ${data.results.split('\n').map(li => `
                  <li class="text-xs text-muted-foreground leading-relaxed flex items-start space-x-2">
                    <span class="text-primary font-bold mt-0.5">•</span>
                    <span>${li.replace('•', '').trim()}</span>
                  </li>
                `).join('')}
              </ul>
            </div>
          </div>
        </div>
      `;

      if (data.interactive === "hosset-canvas") {
        container.innerHTML += HOSSET_CANVAS_HTML;
      } else if (data.interactive === "s23u-sop") {
        container.innerHTML += S23U_SOP_HTML;
      }

      lucide.createIcons();

      if (data.interactive === "hosset-canvas") {
        initHossetCanvas();
      } else if (data.interactive === "s23u-sop") {
        initS23uSop();
      }
    }

    // 執行渲染
    renderCaseStudy();
  </script>
</body>
</html>
