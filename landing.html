<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>郭奕圻 YI-CHI KUO | Martech × AI Workflow × Project Manager</title>
<meta name="description" content="郭奕圻個人作品集入口。選擇你喜歡的介面風格開始瀏覽。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}

body{
  background:#07090d;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  position:relative;
  overflow:hidden;
}

canvas{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:0;
}

.ui{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
  padding:2rem 1rem;
}

/* Top identity */
.identity{
  text-align:center;
  margin-bottom:56px;
}
.name{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(16px,2.5vw,22px);
  font-weight:700;
  color:#e6edf3;
  letter-spacing:.06em;
  margin-bottom:8px;
}
.name span{color:#3fb950;}
.role{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(10px,1.2vw,12px);
  color:#484f58;
  letter-spacing:.12em;
}

/* Select label */
.select-label{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:#3fb950;
  letter-spacing:.18em;
  margin-bottom:48px;
  display:flex;
  align-items:center;
  gap:10px;
}
.select-label::before,
.select-label::after{
  content:'';
  width:40px;
  height:1px;
  background:linear-gradient(to right,transparent,#3fb950);
}
.select-label::after{
  background:linear-gradient(to left,transparent,#3fb950);
}

/* Circles */
.circles{
  display:flex;
  align-items:center;
  gap:clamp(20px,4vw,48px);
}

.cw{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
  position:relative;
  cursor:pointer;
}

.circle{
  width:clamp(72px,10vw,88px);
  height:clamp(72px,10vw,88px);
  border-radius:50%;
  border:1.5px solid;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  text-decoration:none;
}

.cw:hover .circle{transform:scale(1.18);}
.cw:focus-visible .circle{transform:scale(1.18);outline:none;}

.circle-icon{
  font-size:clamp(16px,2.5vw,20px);
  line-height:1;
}

.circle-mode{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(8px,1vw,9px);
  font-weight:700;
  letter-spacing:.08em;
}

.cdot{
  width:5px;height:5px;border-radius:50%;
  margin-top:12px;
  opacity:.3;
  transition:opacity .2s, transform .2s;
}
.cw:hover .cdot{opacity:1;transform:scale(1.3);}

/* Tooltip */
.tip{
  position:absolute;
  bottom:calc(100% + 16px);
  left:50%;
  transform:translateX(-50%) translateY(8px);
  background:rgba(10,14,20,.95);
  border:1px solid #252d3d;
  border-radius:10px;
  padding:10px 14px;
  width:clamp(140px,18vw,168px);
  opacity:0;
  pointer-events:none;
  transition:all .22s ease;
  text-align:center;
  white-space:normal;
}
.cw:hover .tip,
.cw:focus-within .tip{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
.tip-name{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  font-weight:700;
  margin-bottom:5px;
}
.tip-desc{
  font-family:'Noto Sans TC',sans-serif;
  font-size:10px;
  color:#8b949e;
  line-height:1.6;
}
.tip::after{
  content:'';
  position:absolute;
  top:100%;left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;
  border-top-color:#252d3d;
}
.tip::before{
  content:'';
  position:absolute;
  top:100%;left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;
  border-top-color:rgba(10,14,20,.95);
  z-index:1;
  margin-top:-1px;
}

/* Dev Mode - green */
.c-dev{border-color:#3fb950;color:#3fb950;}
.c-dev:hover{background:rgba(63,185,80,.07);}
.cdot-dev{background:#3fb950;}
.tip-dev{color:#3fb950;}

/* Visual Mode - purple */
.c-vis{border-color:#7c3aed;color:#7c3aed;}
.c-vis:hover{background:rgba(124,58,237,.07);}
.cdot-vis{background:#7c3aed;}
.tip-vis{color:#a78bfa;}

/* Brand Mode - warm brown/tan */
.c-brand{border-color:#8b7355;color:#8b7355;}
.c-brand:hover{background:rgba(139,115,85,.08);}
.cdot-brand{background:#8b7355;}
.tip-brand{color:#c9a888;}

/* More - dashed */
.c-more{border-color:#1e2530;color:#1e2530;border-style:dashed;}
.cw:hover .c-more{border-color:#2d3748;color:#2d3748;}
.cdot-more{background:#1e2530;}

/* Bottom hint */
.hint{
  margin-top:52px;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:#2a3142;
  letter-spacing:.1em;
  animation:fadehint 3s ease-in-out infinite;
}
@keyframes fadehint{
  0%,100%{opacity:.4}
  50%{opacity:.8}
}

/* Mobile */
@media(max-width:480px){
  .circles{gap:16px;}
  .select-label::before,.select-label::after{width:20px;}
  body{overflow:auto;}
  html,body{height:auto;min-height:100vh;}
}

@media(prefers-reduced-motion:reduce){
  canvas{display:none}
  .hint{animation:none;opacity:.5}
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui">

  <div class="identity">
    <div class="name"><span>&gt;_</span> YI-CHI KUO</div>
    <div class="role">MARTECH &times; AI WORKFLOW &times; PROJECT MANAGER</div>
  </div>

  <div class="select-label">SELECT INTERFACE</div>

  <div class="circles">

    <!-- Dev Mode -->
    <div class="cw" tabindex="0" role="link" aria-label="進入 Dev Mode" onclick="enter('dev')" onkeydown="if(event.key==='Enter')enter('dev')">
      <div class="tip">
        <div class="tip-name tip-dev">Dev Mode</div>
        <div class="tip-desc">工程美學 · 指令列風格<br>高資訊密度 · Terminal 體驗</div>
      </div>
      <div class="circle c-dev">
        <span class="circle-icon">&gt;_</span>
        <span class="circle-mode">Dev</span>
      </div>
      <div class="cdot cdot-dev"></div>
    </div>

    <!-- Visual Mode -->
    <div class="cw" tabindex="0" role="link" aria-label="進入 Visual Mode" onclick="enter('visual')" onkeydown="if(event.key==='Enter')enter('visual')">
      <div class="tip">
        <div class="tip-name tip-vis">Visual Mode</div>
        <div class="tip-desc">現代視覺 · 卡片佈局<br>數據指標 · Dashboard 體驗</div>
      </div>
      <div class="circle c-vis">
        <span class="circle-icon">⊞</span>
        <span class="circle-mode">Visual</span>
      </div>
      <div class="cdot cdot-vis"></div>
    </div>

    <!-- Brand Mode -->
    <div class="cw" tabindex="0" role="link" aria-label="進入 Brand Mode" onclick="enter('brand')" onkeydown="if(event.key==='Enter')enter('brand')">
      <div class="tip">
        <div class="tip-name tip-brand">Brand Mode</div>
        <div class="tip-desc">極簡日式 · 大量留白<br>溫暖質感 · Brand 敘事體驗</div>
      </div>
      <div class="circle c-brand">
        <span class="circle-icon">✦</span>
        <span class="circle-mode">Brand</span>
      </div>
      <div class="cdot cdot-brand"></div>
    </div>

    <!-- Coming soon -->
    <div class="cw" tabindex="0" role="presentation" aria-label="更多風格即將推出">
      <div class="tip">
        <div class="tip-name" style="color:#3d4a60">即將推出</div>
        <div class="tip-desc">更多介面風格<br>陸續加入中...</div>
      </div>
      <div class="circle c-more">
        <span class="circle-icon" style="font-size:18px">+</span>
      </div>
      <div class="cdot cdot-more"></div>
    </div>

  </div>

  <div class="hint">// hover to preview · click to enter</div>

</div>

<script>
function enter(mode){
  try {
    localStorage.setItem('mode', mode);
    // 舊版雙模式 key 一併寫入，讓還沒升級三模式的頁面至少維持深/淺色一致
    localStorage.setItem('theme', mode === 'dev' ? 'dark' : 'light');
  } catch (e) { /* localStorage 不可用時仍可靠網址參數帶入 */ }
  window.location.href = 'index.html?mode=' + mode;
}

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const COLORS = ['#3fb950','#7c3aed','#8b7355','#d2a8ff','#ffa657','#3fb950'];
const N = 90;
let W, H, pts, mouse = {x:-9999, y:-9999};
let raf;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function init(){
  resize();
  pts = Array.from({length:N}, () => ({
    x: Math.random()*W,
    y: Math.random()*H,
    vx: (Math.random()-.5)*.5,
    vy: (Math.random()-.5)*.5,
    r: Math.random()*1.6+.5,
    color: COLORS[Math.floor(Math.random()*COLORS.length)],
    alpha: Math.random()*.45+.1,
  }));
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const LINK=120, ML=150;

  for(let i=0;i<N;i++){
    const a=pts[i];
    a.x+=a.vx; a.y+=a.vy;
    if(a.x<0||a.x>W) a.vx*=-1;
    if(a.y<0||a.y>H) a.vy*=-1;

    // mouse repel
    const dx=a.x-mouse.x, dy=a.y-mouse.y;
    const md=Math.sqrt(dx*dx+dy*dy);
    if(md<90&&md>0){
      const f=.5*(1-md/90);
      a.vx+=dx/md*f; a.vy+=dy/md*f;
    }

    // speed clamp
    const spd=Math.sqrt(a.vx*a.vx+a.vy*a.vy);
    if(spd>1.4){a.vx=a.vx/spd*1.4;a.vy=a.vy/spd*1.4;}

    // dot
    ctx.beginPath();
    ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
    ctx.fillStyle=a.color;
    ctx.globalAlpha=a.alpha;
    ctx.fill();
    ctx.globalAlpha=1;

    // lines between pts
    for(let j=i+1;j<N;j++){
      const b=pts[j];
      const dx2=a.x-b.x, dy2=a.y-b.y;
      const d=Math.sqrt(dx2*dx2+dy2*dy2);
      if(d<LINK){
        ctx.beginPath();
        ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
        ctx.strokeStyle=a.color;
        ctx.globalAlpha=(1-d/LINK)*.1;
        ctx.lineWidth=.5;
        ctx.stroke();
        ctx.globalAlpha=1;
      }
    }

    // lines to mouse
    const dxm=a.x-mouse.x, dym=a.y-mouse.y;
    const dm=Math.sqrt(dxm*dxm+dym*dym);
    if(dm<ML){
      ctx.beginPath();
      ctx.moveTo(a.x,a.y); ctx.lineTo(mouse.x,mouse.y);
      ctx.strokeStyle=a.color;
      ctx.globalAlpha=(1-dm/ML)*.22;
      ctx.lineWidth=.6;
      ctx.stroke();
      ctx.globalAlpha=1;
    }
  }
  raf=requestAnimationFrame(draw);
}

window.addEventListener('mousemove', e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});
window.addEventListener('mouseleave',()=>{mouse.x=-9999;mouse.y=-9999;});
window.addEventListener('resize',()=>{resize();});

init(); draw();
</script>
</body>
</html>
